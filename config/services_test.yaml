# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\Foundation\Captcha\Contract\CaptchaSolutionStoreInterface: '@App\Foundation\Captcha\Store\InMemoryCaptchaSolutionStore'

  App\Tests\Helper\FixedClock:
    public: true

  Symfony\Component\Clock\ClockInterface:
    alias: App\Tests\Helper\FixedClock
    public: true

  App\Domain\Auth\Service\ResendConfirmationEmailService:
    public: true

  App\Foundation\Bridge\Resolver\EnvironmentAssetResolver:
    arguments:
      $environment: '%kernel.environment%'
      $devResolver: '@App\Foundation\Bridge\Resolver\ViteDevAssetResolver'
      $prodResolver: '@App\Foundation\Bridge\Resolver\ManifestAssetResolver'

  App\Foundation\Bridge\Resolver\ViteDevAssetResolver:
    public: true
    arguments:
      $devServerUrl: '%app.vite.dev_server_url%'
      $publicBasePath: '%app.assets.public_base_path%'